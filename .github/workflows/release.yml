name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        default: v1.0.0
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/MiloDex-Setup-*.exe
          if-no-files-found: error

  android:
    name: Android APK
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        shell: pwsh
        run: |
          $sdkManager = Get-ChildItem "$env:ANDROID_HOME\cmdline-tools" -Recurse -Filter sdkmanager.bat |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $sdkManager) {
            throw 'sdkmanager.bat not found in ANDROID_HOME'
          }
          $yes = ((1..40 | ForEach-Object { 'y' }) -join "`n") + "`n"
          $yes | & $sdkManager --sdk_root=$env:ANDROID_HOME --licenses
          & $sdkManager --sdk_root=$env:ANDROID_HOME "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        shell: pwsh
        run: npm run mobile:apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/android/MiloDex-Android-*-debug.apk
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - windows
      - android
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
